# nginx proxy address - http://172.17.0.1:8085

name: headscale
x-logging: &default-logging
  options:
    max-size: '5m'
    max-file: '1'
  driver: json-file

services:
  app:
    image: headscale/headscale:latest
    container_name: headscale-app
    hostname: ${BASE_HOST_NAME:-$HOSTNAME}
    restart: always
    pull_policy: always
    logging: *default-logging
    command: serve
    environment:
      TZ: ${TZ:-America/New_York}
    ports:
      - '172.17.0.1:8085:8080'
      - '172.17.0.1:9090:9090'
    volumes:
      - './volumes/config/headscale:/etc/headscale'
      - './volumes/data/headscale:/var/lib/headscale'
    networks:
      - headscale

  headscale-ui:
    image: ghcr.io/gurucomputing/headscale-ui:latest
    container_name: headscale-ui
    restart: always
    pull_policy: always
    logging: *default-logging
    environment:
      TZ: ${TZ:-America/New_York}
    ports:
      - '172.17.0.1:8086:80'
    networks:
      - headscale

networks:
  headscale:
    name: headscale
    external: false
